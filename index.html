<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Pium Pium</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&family=DM+Serif+Display:ital@0;1&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
/* view switcher */
.view-index { display: block; }
.view-admin  { display: none;  }
body.is-admin .view-index { display: none !important; }
body.is-admin .view-admin  { display: block; }

/* index (catalog) styles */

:root {
  --cream:   #F5F0E8;
  --cream2:  #EDE5D8;
  --cream3:  #E0D5C5;
  --brown:   #5C2E0E;
  --brown2:  #8B4513;
  --brown3:  #C4732A;
  --gold:    #C4A03A;
  --gold2:   #E8C96A;
  --blush:   #F2C4C4;
  --blush2:  #E8A0A0;
  --olive:   #8B8B3A;
  --olive2:  #C4C43A;
  --ink:     #2A1A08;
  --ink2:    #5C3D20;
  --ink3:    #9A7A5A;
  --white:   #FEFCF8;
  --r:       14px;
  --safe-b:  env(safe-area-inset-bottom, 0px);

  /* family pill colors */
  --floral-bg:#FBEAF0; --floral-c:#72243E;
  --fresh-bg: #E1F5EE; --fresh-c: #085041;
  --woody-bg: #FAEEDA; --woody-c: #633806;
  --oriental-bg:#FAECE7; --oriental-c:#4A1B0C;
  --gourmand-bg:#EEEDFE; --gourmand-c:#26215C;
  --chypre-bg: #EAF3DE; --chypre-c: #173404;
  --aquatic-bg:#E6F1FB; --aquatic-c: #042C53;
  --fougere-bg:#F1EFE8; --fougere-c: #2C2C2A;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
  height: 100%;
  font-family: 'DM Sans', sans-serif;
  background: var(--cream);
  color: var(--ink);
  overflow-x: hidden;
}

/* ── HEADER ── */
.header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--cream);
  border-bottom: 1.5px solid var(--cream3);
}

.header-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 16px 6px;
}

.brand {
  display: flex;
  align-items: center;
  gap: 8px;
}

.brand-logo {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  object-fit: cover;
  border: 2px solid var(--brown3);
}

.brand-text {
  display: flex;
  flex-direction: column;
  line-height: 1.1;
}

.brand-name {
  font-family: 'Playfair Display', serif;
  font-size: 20px;
  font-weight: 700;
  color: var(--brown);
  letter-spacing: -0.02em;
}

.brand-sub {
  font-size: 10px;
  font-weight: 300;
  color: var(--ink3);
  letter-spacing: 0.12em;
  text-transform: uppercase;
}

.header-count {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--ink3);
  background: var(--cream2);
  padding: 4px 10px;
  border-radius: 999px;
  border: 0.5px solid var(--cream3);
}

/* search bar */
.search-wrap {
  padding: 0 16px 8px;
  position: relative;
}

.search-icon {
  position: absolute;
  left: 28px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 15px;
  color: var(--ink3);
  pointer-events: none;
}

.search-input {
  width: 100%;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 400;
  color: var(--ink);
  background: var(--white);
  border: 1px solid var(--cream3);
  border-radius: 999px;
  padding: 9px 16px 9px 38px;
  outline: none;
  transition: border-color 0.2s;
}

.search-input:focus { border-color: var(--brown3); }
.search-input::placeholder { color: var(--ink3); }

/* filter pills */
.filters-scroll {
  display: flex;
  gap: 6px;
  padding: 0 16px 10px;
  overflow-x: auto;
  scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
}
.filters-scroll::-webkit-scrollbar { display: none; }

.fpill {
  flex-shrink: 0;
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  font-weight: 500;
  padding: 5px 13px;
  border-radius: 999px;
  border: 1px solid var(--cream3);
  background: var(--white);
  color: var(--ink2);
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}

.fpill:active { transform: scale(0.95); }

.fpill.active-dama  { background: #FBEAF0; border-color: #E8A0A0; color: #72243E; }
.fpill.active-cab   { background: #E6F1FB; border-color: #9AB8D4; color: #0C447C; }
.fpill.active-unisex{ background: #E1F5EE; border-color: #9ACFB8; color: #085041; }
.fpill.active-all   { background: var(--brown); border-color: var(--brown); color: var(--white); }

.fpill.active-floral   { background: var(--floral-bg);   border-color: var(--blush2); color: var(--floral-c); }
.fpill.active-fresh    { background: var(--fresh-bg);    border-color: #9ACFB8;      color: var(--fresh-c); }
.fpill.active-woody    { background: var(--woody-bg);    border-color: #D4A87A;      color: var(--woody-c); }
.fpill.active-oriental { background: var(--oriental-bg); border-color: #D49A7A;      color: var(--oriental-c); }
.fpill.active-gourmand { background: var(--gourmand-bg); border-color: #A89ACC;      color: var(--gourmand-c); }
.fpill.active-chypre   { background: var(--chypre-bg);   border-color: #98B878;      color: var(--chypre-c); }
.fpill.active-aquatic  { background: var(--aquatic-bg);  border-color: #7AACCC;      color: var(--aquatic-c); }
.fpill.active-fougere  { background: var(--fougere-bg);  border-color: #B8B0A8;      color: var(--fougere-c); }

/* ── GRID ── */
.catalog-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  padding: 12px 12px calc(24px + var(--safe-b));
}

@media (max-width: 360px) {
  .catalog-grid { grid-template-columns: 1fr; }
}
@media (min-width: 600px) {
  .catalog-grid { grid-template-columns: repeat(3, 1fr); }
}

/* ── CARD ── */
.prod-card {
  background: var(--white);
  border: 1px solid var(--cream3);
  border-radius: var(--r);
  overflow: hidden;
  display: flex;
  flex-direction: column;
  animation: fadeUp 0.3s ease both;
  transition: transform 0.18s, box-shadow 0.18s;
  cursor: pointer;
}

.prod-card:active { transform: scale(0.97); }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* stagger */
.prod-card:nth-child(1) { animation-delay: 0.02s; }
.prod-card:nth-child(2) { animation-delay: 0.04s; }
.prod-card:nth-child(3) { animation-delay: 0.06s; }
.prod-card:nth-child(4) { animation-delay: 0.08s; }
.prod-card:nth-child(5) { animation-delay: 0.10s; }
.prod-card:nth-child(6) { animation-delay: 0.12s; }

/* card accent strip by cat */
.prod-card::before {
  content: '';
  display: block;
  height: 3px;
  background: var(--strip-color, var(--brown3));
}
.prod-card.cat-dama::before   { --strip-color: var(--blush2); }
.prod-card.cat-cab::before    { --strip-color: #7AACCC; }
.prod-card.cat-unisex::before { --strip-color: #9ACFB8; }

.prod-card-body {
  padding: 10px 11px 11px;
  display: flex;
  flex-direction: column;
  gap: 7px;
  flex: 1;
}

/* name */
.namePiumPium {
  font-family: 'DM Mono', monospace;
  font-size: 17px;
  font-weight: 500;
  color: var(--brown3);
  letter-spacing: 0.02em;
  line-height: 1;
}

/* inspired by */
.instpireby-label {
  font-size: 9px;
  font-weight: 500;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ink3);
  margin-bottom: 1px;
}

.prod-name {
  font-family: 'Playfair Display', serif;
  font-size: 12px;
  font-weight: 700;
  color: var(--ink);
  line-height: 1.25;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.prod-house {
  font-size: 10px;
  color: var(--ink3);
  font-weight: 300;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* badges row */
.prod-badges {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
}

.badge {
  display: inline-block;
  font-size: 9px;
  font-weight: 500;
  padding: 2px 7px;
  border-radius: 999px;
  letter-spacing: 0.03em;
}

.badge-dama   { background: #FBEAF0; color: #72243E; }
.badge-cab    { background: #E6F1FB; color: #0C447C; }
.badge-unisex { background: #E1F5EE; color: #085041; }

/* notes */
.cnotes {
  display: flex;
  flex-wrap: wrap;
  gap: 3px;
}

.ntag {
  font-size: 9px;
  font-weight: 400;
  padding: 2px 6px;
  border-radius: 999px;
}

/* note color map */
.ntag-rose, .ntag-jasmine, .ntag-peony, .ntag-floral, .ntag-lily, .ntag-freesia, .ntag-orchid, .ntag-tuberose {
  background: #FBEAF0; color: #72243E;
}
.ntag-bergamot, .ntag-lemon, .ntag-grapefruit, .ntag-citrus, .ntag-mandarin, .ntag-orange {
  background: #FFF8E1; color: #7A5700;
}
.ntag-musk, .ntag-sandalwood, .ntag-cedarwood, .ntag-cedar, .ntag-vetiver, .ntag-patchouli, .ntag-woody, .ntag-leather, .ntag-oud {
  background: #FAEEDA; color: #633806;
}
.ntag-vanilla, .ntag-tonka, .ntag-praline, .ntag-cocoa, .ntag-amber, .ntag-tonka\ bean, .ntag-gourmand {
  background: #FAC775; color: #412402;
}
.ntag-lavender, .ntag-iris, .ntag-violet, .ntag-heliotrope {
  background: #EEEDFE; color: #3C3489;
}
.ntag-aquatic, .ntag-sea\ notes, .ntag-mint, .ntag-fresh, .ntag-green\ notes {
  background: #E6F1FB; color: #042C53;
}
.ntag-raspberry, .ntag-cherry, .ntag-blackcurrant, .ntag-plum, .ntag-peach, .ntag-kiwi, .ntag-lychee, .ntag-pear, .ntag-apple, .ntag-mango, .ntag-coconut {
  background: #F0EAF8; color: #4A2870;
}
.ntag-incense, .ntag-resin, .ntag-saffron, .ntag-cardamom, .ntag-pepper, .ntag-spice, .ntag-cinnamon, .ntag-ginger, .ntag-pink\ pepper, .ntag-black\ pepper {
  background: #FAECE7; color: #4A1B0C;
}
.ntag-oakmoss, .ntag-geranium, .ntag-ylang\ ylang, .ntag-orange\ blossom, .ntag-camellia, .ntag-magnolia, .ntag-dragon\ fruit, .ntag-ambroxan, .ntag-guaiac\ wood, .ntag-cashmere, .ntag-white\ musk, .ntag-lotus {
  background: #EAF3DE; color: #173404;
}

/* ── EMPTY STATE ── */
.empty-state {
  grid-column: 1/-1;
  text-align: center;
  padding: 4rem 1rem;
  color: var(--ink3);
  font-size: 14px;
}

.empty-state span {
  display: block;
  font-size: 40px;
  margin-bottom: 12px;
}

/* ── MODAL ── */
.modal-overlay {
  position: fixed;
  inset: 0;
  z-index: 200;
  background: rgba(42, 26, 8, 0.55);
  backdrop-filter: blur(3px);
  -webkit-backdrop-filter: blur(3px);
  display: flex;
  align-items: flex-end;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s;
}

.modal-overlay.open {
  opacity: 1;
  pointer-events: all;
}

.modal-sheet {
  width: 100%;
  background: var(--white);
  border-radius: 22px 22px 0 0;
  padding: 0 0 calc(20px + var(--safe-b));
  max-height: 88vh;
  overflow-y: auto;
  transform: translateY(100%);
  transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
}

.modal-overlay.open .modal-sheet {
  transform: translateY(0);
}

.modal-handle {
  width: 40px;
  height: 4px;
  background: var(--cream3);
  border-radius: 2px;
  margin: 14px auto 0;
}

.modal-accent {
  height: 4px;
  margin-top: 12px;
}

.modal-header {
  padding: 16px 20px 0;
}

.modal-code {
  font-family: 'DM Mono', monospace;
  font-size: 22px;
  font-weight: 500;
  color: var(--brown3);
}

.modal-inspired-label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--ink3);
  margin-top: 10px;
}

.modal-perfume-name {
  font-family: 'Playfair Display', serif;
  font-size: 22px;
  font-weight: 700;
  color: var(--ink);
  line-height: 1.2;
  margin-top: 2px;
}

.modal-house {
  font-size: 13px;
  color: var(--ink3);
  margin-top: 2px;
}

.modal-badges {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-top: 10px;
}

.modal-badge {
  font-size: 11px;
  font-weight: 500;
  padding: 4px 12px;
  border-radius: 999px;
}

.modal-section {
  padding: 14px 20px 0;
}

.modal-section-title {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--ink3);
  font-weight: 500;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.modal-section-title::after {
  content: '';
  flex: 1;
  height: 0.5px;
  background: var(--cream3);
}

.modal-notes {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
}

.modal-ntag {
  font-size: 12px;
  font-weight: 400;
  padding: 4px 10px;
  border-radius: 999px;
}

.similar-list {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.similar-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 12px;
  background: var(--cream);
  border-radius: 10px;
}

.similar-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--brown3);
  flex-shrink: 0;
}

.similar-name {
  font-size: 13px;
  font-weight: 500;
  color: var(--ink);
  flex: 1;
  min-width: 0;
}

.similar-house {
  font-size: 11px;
  color: var(--ink3);
}

.modal-close-btn {
  display: block;
  width: calc(100% - 40px);
  margin: 18px 20px 0;
  padding: 13px;
  background: var(--brown);
  color: var(--white);
  border: none;
  border-radius: 12px;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  letter-spacing: 0.04em;
  transition: background 0.15s;
}

.modal-close-btn:active { background: var(--brown2); }

/* ── DECORATIVE HEADER BLOBS ── */
.header-deco {
  position: absolute;
  inset: 0;
  overflow: hidden;
  pointer-events: none;
  z-index: 0;
}

.page-hero {
  position: relative;
  overflow: hidden;
  background: var(--cream);
  padding: 28px 20px 22px;
  text-align: center;
  border-bottom: 1.5px solid var(--cream3);
}

.hero-blob {
  position: absolute;
  border-radius: 50%;
  opacity: 0.55;
  filter: blur(28px);
}

.hero-blob-1 {
  width: 200px; height: 200px;
  background: var(--blush);
  top: -60px; right: -40px;
}

.hero-blob-2 {
  width: 160px; height: 160px;
  background: var(--gold2);
  opacity: 0.35;
  bottom: -50px; left: -30px;
}

.hero-blob-3 {
  width: 130px; height: 130px;
  background: #D4B896;
  top: 20px; left: 30px;
  opacity: 0.4;
}

.hero-hearts {
  display: flex;
  justify-content: center;
  gap: 60px;
  margin-bottom: 4px;
  position: relative;
  z-index: 1;
}

.hero-heart {
  color: var(--brown2);
  font-size: 16px;
  opacity: 0.7;
}

.hero-title {
  font-family: 'Playfair Display', serif;
  font-size: 42px;
  font-weight: 700;
  color: var(--brown);
  line-height: 1;
  letter-spacing: -0.02em;
  position: relative;
  z-index: 1;
}

.hero-sub {
  font-size: 13px;
  font-weight: 300;
  letter-spacing: 0.18em;
  text-transform: lowercase;
  color: var(--ink2);
  margin-top: 6px;
  position: relative;
  z-index: 1;
}


/* ── STOCK PILL (catalog) ── */
.stock-pill {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  font-weight: 500;
  padding: 2px 8px;
  border-radius: 999px;
}
.stock-pill.sp-ok   { background: #E8F5EF; color: #2a7a4a; }
.stock-pill.sp-low  { background: #FAEEDA; color: #C4732A; }
.stock-pill.sp-zero { background: #FFF0EE; color: #c23b2a; }
.stock-pill.sp-none { display: none; }

.stock-row {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
  margin-top: 2px;
}

.stock-sold {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  color: var(--ink3);
  font-weight: 400;
}

.modal-stock-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  border-radius: 10px;
  margin-top: 2px;
}
.modal-stock-row.sp-ok   { background: #E8F5EF; }
.modal-stock-row.sp-low  { background: #FAEEDA; }
.modal-stock-row.sp-zero { background: #FFF0EE; }
.msr-num {
  font-family: 'DM Mono', monospace;
  font-size: 26px;
  font-weight: 500;
  line-height: 1;
}
.msr-num.sp-ok   { color: #2a7a4a; }
.msr-num.sp-low  { color: #C4732A; }
.msr-num.sp-zero { color: #c23b2a; }
.msr-labels { display: flex; flex-direction: column; gap: 1px; }
.msr-label  { font-size: 9px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--ink3); }
.msr-sold   { font-size: 11px; color: var(--ink3); }

/* scrollbar */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--cream3); border-radius: 2px; }


/* manager (admin) styles */

:root{--ink:#1a1510;--ink2:#4a3f35;--ink3:#8a7a6e;--cream:#faf7f2;--cream2:#f2ede4;--cream3:#e8e0d4;--gold:#c9932a;--gold2:#e8b84b;--red:#c23b2a;--green:#2a7a4a;--blue:#1a4a8a;--purple:#6b3fa0;--border:rgba(26,21,16,0.1);--r:12px;--safe-bottom:env(safe-area-inset-bottom,0px);}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;font-family:'Outfit',sans-serif;background:var(--cream);color:var(--ink);}
.app{display:flex;flex-direction:column;height:100%;max-width:600px;margin:0 auto;}
.topbar{background:var(--ink);padding:0 16px;height:52px;display:flex;align-items:center;gap:10px;border-bottom:2px solid var(--gold);flex-shrink:0;}
.topbar-brand{font-family:'DM Serif Display',serif;font-size:18px;color:var(--gold2);flex:1;}
.topbar-brand span{font-style:italic;color:#8a7a6e;font-size:12px;font-family:'Outfit',sans-serif;font-weight:300;margin-left:6px;}
.db-badge{font-size:10px;font-family:'DM Mono',monospace;padding:2px 8px;border-radius:999px;background:rgba(42,122,74,0.18);color:var(--green);}
.scroll-area{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding:12px 12px 0;}
.bottom-nav{background:#fff;border-top:0.5px solid var(--border);display:flex;flex-shrink:0;padding-bottom:var(--safe-bottom);}
.bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:9px 4px;border:none;background:transparent;cursor:pointer;font-family:'Outfit',sans-serif;font-size:10px;font-weight:500;color:var(--ink3);}
.bnav-btn i{font-size:20px;}
.bnav-btn.active{color:var(--gold);}
.page{display:none;}.page.active{display:block;}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.stat-card{background:#fff;border:0.5px solid var(--border);border-radius:var(--r);padding:12px 14px;}
.stat-label{font-size:10px;color:var(--ink3);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:3px;}
.stat-val{font-family:'DM Mono',monospace;font-size:24px;font-weight:500;}
.stat-val.gold{color:var(--gold);}.stat-val.red{color:var(--red);}.stat-val.green{color:var(--green);}.stat-val.purple{color:var(--purple);}
.alert{display:flex;align-items:center;gap:10px;background:#fff8ed;border-left:3px solid var(--gold);border-radius:var(--r);padding:10px 12px;font-size:12px;color:var(--ink2);margin-bottom:6px;}
.alert.danger{background:#fff2f0;border-left-color:var(--red);}
.alert-dot{width:7px;height:7px;border-radius:50%;background:var(--gold);flex-shrink:0;}
.alert-dot.red{background:var(--red);}
.panel{background:#fff;border:0.5px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:10px;}
.panel-title{font-family:'DM Serif Display',serif;font-size:14px;color:var(--ink);margin-bottom:10px;display:flex;align-items:center;gap:7px;}
.panel-title::before{content:'';display:block;width:3px;height:14px;background:var(--gold);border-radius:2px;}
.rank-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:0.5px solid var(--cream3);font-size:12px;}
.rank-row:last-child{border-bottom:none;}
.rank-num{font-family:'DM Mono',monospace;font-size:11px;color:var(--ink3);min-width:18px;}
.rank-name{flex:1;color:var(--ink2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.rank-val{font-family:'DM Mono',monospace;font-size:13px;font-weight:500;}
.rank-val.sold{color:var(--green);}.rank-val.low{color:var(--red);}
.toolbar{display:flex;gap:7px;margin-bottom:10px;flex-wrap:wrap;}
.toolbar input,.toolbar select{font-family:'Outfit',sans-serif;font-size:13px;padding:9px 11px;border:0.5px solid var(--border);border-radius:9px;background:#fff;color:var(--ink);min-width:0;flex:1;}
.btn{font-family:'Outfit',sans-serif;font-size:13px;font-weight:500;padding:9px 14px;border-radius:9px;border:none;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:5px;transition:all 0.13s;-webkit-appearance:none;}
.btn:active{transform:scale(0.96);}
.btn-gold{background:var(--gold);color:#fff;}.btn-outline{background:transparent;border:0.5px solid var(--border);color:var(--ink2);}
.btn-green{background:var(--green);color:#fff;}.btn-red{background:var(--red);color:#fff;}
.btn-purple{background:var(--purple);color:#fff;}.btn-blue{background:var(--blue);color:#fff;}
.btn-sm{padding:7px 11px;font-size:12px;border-radius:7px;}
.fab{position:fixed;bottom:calc(68px + var(--safe-bottom));right:16px;width:52px;height:52px;border-radius:50%;background:var(--gold);color:#fff;border:none;font-size:24px;cursor:pointer;display:none;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(201,147,42,0.4);z-index:10;}
.fab:active{transform:scale(0.93);}
.prod-card{background:#fff;border:0.5px solid var(--border);border-radius:var(--r);padding:13px;margin-bottom:8px;display:flex;flex-direction:column;gap:7px;}
.prod-card-top{display:flex;align-items:flex-start;gap:8px;}
.prod-card-info{flex:1;min-width:0;}
.namePiumPium{font-family:'DM Mono',monospace;font-size:15px;font-weight:500;color:var(--gold);letter-spacing:0.04em;margin-bottom:2px;}
.instpireby h3{font-size:9px;text-transform:uppercase;letter-spacing:0.08em;color:var(--ink3);font-weight:500;margin-bottom:1px;}
.prod-name{font-size:13px;font-weight:600;color:var(--ink);line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.prod-house{font-size:11px;color:var(--ink3);}
.prod-code{font-family:'DM Mono',monospace;font-size:10px;color:var(--ink3);}
.prod-badges{display:flex;gap:4px;flex-wrap:wrap;}
.prod-stock-block{display:flex;flex-direction:column;align-items:flex-end;gap:2px;flex-shrink:0;}
.stock-big{font-family:'DM Mono',monospace;font-size:22px;font-weight:500;line-height:1;}
.stock-zero{color:var(--red);}.stock-low{color:var(--gold);}.stock-ok{color:var(--green);}
.stock-lbl{font-size:9px;color:var(--ink3);text-transform:uppercase;letter-spacing:0.05em;}
.sold-lbl{font-size:10px;color:var(--ink3);}
.prod-actions{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;}
.badge{display:inline-block;font-size:10px;padding:2px 7px;border-radius:999px;font-weight:500;}
.badge-dama{background:#FBEAF0;color:#72243E;}.badge-cab{background:#E6F1FB;color:#0C447C;}.badge-unisex{background:#E1F5EE;color:#085041;}
.order-card{background:#fff;border:0.5px solid var(--border);border-radius:var(--r);padding:13px;margin-bottom:8px;cursor:pointer;transition:border-color 0.15s;}
.order-card:hover{border-color:var(--gold);}
.order-card.closed{opacity:0.65;}
.order-header{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;}
.order-id{font-family:'DM Mono',monospace;font-size:12px;color:var(--ink3);}
.order-client{font-size:14px;font-weight:600;color:var(--ink);margin-top:2px;}
.order-date{font-size:11px;color:var(--ink3);}
.order-meta{display:flex;align-items:center;gap:8px;margin-top:8px;}
.order-items-count{font-size:12px;color:var(--ink2);}
.order-status{font-size:10px;font-weight:600;padding:3px 9px;border-radius:999px;}
.os-open{background:#e6f1fb;color:var(--blue);}
.os-closed{background:#e8f5ef;color:var(--green);}
.sec-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.sec-hd h2{font-family:'DM Serif Display',serif;font-size:18px;color:var(--ink);}
.count-lbl{font-size:11px;color:var(--ink3);}
.empty-state{text-align:center;padding:2.5rem 1rem;color:var(--ink3);font-size:13px;}
.spinner{display:flex;align-items:center;justify-content:center;padding:3rem;color:var(--ink3);font-size:13px;}
.order-detail-header{background:#fff;border:0.5px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:10px;}
.odh-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:10px;}
.odh-id{font-family:'DM Mono',monospace;font-size:11px;color:var(--ink3);}
.odh-client{font-size:17px;font-weight:600;color:var(--ink);}
.odh-note{font-size:12px;color:var(--ink3);margin-top:3px;}
.odh-actions{display:flex;gap:6px;flex-wrap:wrap;}
.order-item-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:0.5px solid var(--cream3);}
.order-item-row:last-child{border-bottom:none;}
.oir-info{flex:1;min-width:0;}
.oir-name{font-size:13px;font-weight:500;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.oir-house{font-size:11px;color:var(--ink3);}
.oir-qty{font-family:'DM Mono',monospace;font-size:15px;font-weight:500;color:var(--ink);min-width:28px;text-align:right;}
.oir-stock{font-size:10px;color:var(--ink3);text-align:right;}
.oir-del{background:transparent;border:none;color:var(--ink3);cursor:pointer;font-size:18px;padding:4px;line-height:1;}
.qty-ctrl{display:flex;align-items:center;gap:6px;}
.qty-btn{width:28px;height:28px;border-radius:6px;border:0.5px solid var(--border);background:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--ink);}
.qty-btn:active{background:var(--cream2);}
.hist-row{display:flex;gap:10px;padding:10px 0;border-bottom:0.5px solid var(--cream3);font-size:12px;align-items:flex-start;}
.hist-row:last-child{border-bottom:none;}
.hist-type{font-size:9px;font-weight:600;padding:2px 7px;border-radius:999px;text-transform:uppercase;letter-spacing:0.04em;flex-shrink:0;margin-top:2px;}
.ht-add{background:#e8f5ef;color:var(--green);}.ht-sell{background:#fff2f0;color:var(--red);}
.ht-new{background:#e6f1fb;color:var(--blue);}.ht-edit{background:#faeeda;color:var(--gold);}
.ht-order{background:#f0eafa;color:var(--purple);}
.hist-body{flex:1;line-height:1.5;}.hist-meta{font-size:10px;color:var(--ink3);}
.hist-date{font-family:'DM Mono',monospace;font-size:10px;color:var(--ink3);text-align:right;white-space:nowrap;}
.sheet-overlay{position:fixed;inset:0;background:rgba(26,21,16,0.5);z-index:50;display:flex;flex-direction:column;justify-content:flex-end;opacity:0;pointer-events:none;transition:opacity 0.22s;}
.sheet-overlay.open{opacity:1;pointer-events:all;}
.sheet{background:#fff;border-radius:18px 18px 0 0;padding:20px 16px calc(20px + var(--safe-bottom));max-height:92vh;overflow-y:auto;transform:translateY(100%);transition:transform 0.28s cubic-bezier(0.32,0.72,0,1);}
.sheet-overlay.open .sheet{transform:translateY(0);}
.sheet-handle{width:36px;height:4px;background:var(--cream3);border-radius:2px;margin:0 auto 16px;}
.sheet-title{font-family:'DM Serif Display',serif;font-size:19px;color:var(--ink);margin-bottom:14px;}
.sheet-info{font-size:13px;color:var(--ink2);margin-bottom:14px;line-height:1.6;}
.sheet-info strong{color:var(--ink);}
.field{margin-bottom:12px;}
.field label{display:block;font-size:11px;font-weight:500;color:var(--ink3);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:5px;}
.field input,.field select,.field textarea{width:100%;font-family:'Outfit',sans-serif;font-size:15px;padding:11px 13px;border:0.5px solid var(--border);border-radius:10px;background:var(--cream);color:var(--ink);}
.field input:focus,.field select:focus{outline:none;border-color:var(--gold);background:#fff;}
.field textarea{resize:vertical;min-height:60px;}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.sheet-actions{display:flex;gap:8px;margin-top:14px;}
.sheet-actions .btn{flex:1;padding:12px;}
.search-results{margin-top:8px;max-height:260px;overflow-y:auto;}
.sr-row{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:8px;cursor:pointer;transition:background 0.1s;}
.sr-row:hover{background:var(--cream2);}
.sr-name{flex:1;font-size:13px;font-weight:500;color:var(--ink);}
.sr-house{font-size:11px;color:var(--ink3);}
.sr-stock{font-family:'DM Mono',monospace;font-size:12px;font-weight:500;}
.sr-stock.ok{color:var(--green);}.sr-stock.low{color:var(--gold);}.sr-stock.zero{color:var(--red);}
.back-btn{display:flex;align-items:center;gap:6px;background:transparent;border:none;cursor:pointer;font-family:'Outfit',sans-serif;font-size:13px;color:var(--ink3);padding:0;margin-bottom:12px;}
.back-btn i{font-size:16px;}

</style>
</head>

<div class="sheet-overlay" id="sheet-stock" onclick="sheetBg(event,'sheet-stock')"><div class="sheet"><div class="sheet-handle"></div><div class="sheet-title">Add stock</div><div class="sheet-info" id="ss-info"></div><div class="field"><label>Quantity</label><input type="number" id="ss-qty" min="1" value="1" inputmode="numeric"></div><div class="field"><label>Note (optional)</label><input type="text" id="ss-note" placeholder="e.g. April restock"></div><div class="sheet-actions"><button class="btn btn-outline" onclick="closeSheet('sheet-stock')">Cancel</button><button class="btn btn-green" onclick="confirmAddStock()">Add stock</button></div></div></div>

<script>
// ── SHARED STOCK (IndexedDB — same DB as piumpiummanager) ──
const DB_NAME = 'ParfumsDB', DB_VER = 3;
let _db = null;

function _openDB() {
  if (_db) return Promise.resolve(_db);
  return new Promise((res, rej) => {
    const req = indexedDB.open(DB_NAME, DB_VER);
    req.onupgradeneeded = e => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains('products')) {
        const s = d.createObjectStore('products', {keyPath:'code'});
        s.createIndex('cat','cat',{unique:false});
        s.createIndex('family','family',{unique:false});
      }
      if (!d.objectStoreNames.contains('inventory')) {
        const s = d.createObjectStore('inventory', {keyPath:'code'});
        s.createIndex('stock','stock',{unique:false});
        s.createIndex('sold','sold',{unique:false});
      }
      if (!d.objectStoreNames.contains('history')) {
        const s = d.createObjectStore('history', {keyPath:'id',autoIncrement:true});
      }
      if (!d.objectStoreNames.contains('orders')) {
        const s = d.createObjectStore('orders', {keyPath:'id',autoIncrement:true});
        s.createIndex('status','status',{unique:false});
        s.createIndex('createdAt','createdAt',{unique:false});
      }
    };
    req.onsuccess = e => { _db = e.target.result; res(_db); };
    req.onerror  = () => rej(req.error);
  });
}

function _idbGet(store, key) {
  return _openDB().then(db => new Promise((r,j) => {
    const q = db.transaction(store).objectStore(store).get(key);
    q.onsuccess = () => r(q.result);
    q.onerror   = () => j(q.error);
  }));
}

function _idbGetAll(store) {
  return _openDB().then(db => new Promise((r,j) => {
    const q = db.transaction(store).objectStore(store).getAll();
    q.onsuccess = () => r(q.result);
    q.onerror   = () => j(q.error);
  }));
}

// invMap cache: code → {stock, sold}
let _invMap = {};

async function _loadInventory() {
  try {
    const rows = await _idbGetAll('inventory');
    _invMap = Object.fromEntries(rows.map(r => [r.code, r]));
  } catch(e) {
    _invMap = {};
  }
}

function _stockOf(code) {
  const r = _invMap[code];
  return r ? (r.stock || 0) : null;   // null = manager never opened (no data yet)
}

function _soldOf(code) {
  const r = _invMap[code];
  return r ? (r.sold || 0) : 0;
}

// Re-load and re-render when tab becomes visible again (manager may have run)
document.addEventListener('visibilitychange', async () => {
  if (document.visibilityState === 'visible') {
    await _loadInventory();
    render();
  }
});

// ── NOTE COLOR CLASSES ──
const NOTE_CLASSES = {
  rose:'ntag-rose', jasmine:'ntag-jasmine', peony:'ntag-peony', lily:'ntag-lily',
  freesia:'ntag-freesia', orchid:'ntag-orchid', tuberose:'ntag-tuberose',
  bergamot:'ntag-bergamot', lemon:'ntag-lemon', grapefruit:'ntag-grapefruit',
  citrus:'ntag-citrus', mandarin:'ntag-mandarin', orange:'ntag-orange',
  musk:'ntag-musk', sandalwood:'ntag-sandalwood', cedarwood:'ntag-cedarwood',
  cedar:'ntag-cedar', vetiver:'ntag-vetiver', patchouli:'ntag-patchouli',
  leather:'ntag-leather', oud:'ntag-oud',
  vanilla:'ntag-vanilla', amber:'ntag-amber', cocoa:'ntag-cocoa',
  praline:'ntag-praline', 'tonka bean':'ntag-tonka',
  lavender:'ntag-lavender', iris:'ntag-iris', violet:'ntag-violet',
  heliotrope:'ntag-heliotrope',
  aquatic:'ntag-aquatic', mint:'ntag-mint', 'sea notes':'ntag-aquatic',
  'green notes':'ntag-aquatic',
  raspberry:'ntag-raspberry', cherry:'ntag-cherry', blackcurrant:'ntag-blackcurrant',
  plum:'ntag-plum', peach:'ntag-peach', kiwi:'ntag-kiwi', lychee:'ntag-lychee',
  pear:'ntag-pear', apple:'ntag-apple', mango:'ntag-mango', coconut:'ntag-coconut',
  'dragon fruit':'ntag-raspberry',
  incense:'ntag-incense', saffron:'ntag-saffron', cardamom:'ntag-cardamom',
  pepper:'ntag-pepper', cinnamon:'ntag-cinnamon', ginger:'ntag-ginger',
  'pink pepper':'ntag-pepper', 'black pepper':'ntag-pepper', resin:'ntag-incense',
  oakmoss:'ntag-oakmoss', geranium:'ntag-oakmoss', 'ylang ylang':'ntag-oakmoss',
  'orange blossom':'ntag-oakmoss', camellia:'ntag-oakmoss', magnolia:'ntag-oakmoss',
  ambroxan:'ntag-oakmoss', 'guaiac wood':'ntag-musk', cashmere:'ntag-oakmoss',
  'white musk':'ntag-musk', lotus:'ntag-aquatic',
};

const FAMILY_LABELS = {
  floral:'Floral', fresh:'Fresh', woody:'Woody', oriental:'Oriental',
  gourmand:'Gourmand', chypre:'Chypre', aquatic:'Aquatic', fougere:'Fougère'
};

const FAMILY_COLORS = {
  floral:   {bg:'#FBEAF0',c:'#72243E'},
  fresh:    {bg:'#E1F5EE',c:'#085041'},
  woody:    {bg:'#FAEEDA',c:'#633806'},
  oriental: {bg:'#FAECE7',c:'#4A1B0C'},
  gourmand: {bg:'#EEEDFE',c:'#26215C'},
  chypre:   {bg:'#EAF3DE',c:'#173404'},
  aquatic:  {bg:'#E6F1FB',c:'#042C53'},
  fougere:  {bg:'#F1EFE8',c:'#2C2C2A'},
};

const CAT_STRIP = {
  dama:'#E8A0A0', cab:'#7AACCC', unisex:'#9ACFB8'
};

let activeCat = 'all', activeFam = 'all', searchQ = '';

function noteTag(note, big = false) {
  const cls = NOTE_CLASSES[note.toLowerCase()] || 'ntag-musk';
  const sz = big ? 'font-size:12px;padding:4px 10px;' : '';
  return `<span class="ntag ${cls}" style="${sz}">${note}</span>`;
}

function renderCard(p) {
  const fm = FAMILY_COLORS[p.family] || {bg:'#eee',c:'#333'};
  const catLabel = p.cat === 'dama' ? 'Dama' : p.cat === 'cab' ? 'Caballero' : 'Unisex';
  const catBadge = `badge-${p.cat}`;
  const notes = (p.notes || []).slice(0, 5).map(n => noteTag(n)).join('');
  const stk  = _stockOf(p.code);
  const sold = _soldOf(p.code);
  const spClass = stk === null ? 'sp-none' : stk === 0 ? 'sp-zero' : stk <= 5 ? 'sp-low' : 'sp-ok';
  const spText  = stk === null ? '' : stk === 0 ? 'Sin stock' : stk <= 5 ? `${stk} disponibles` : `${stk} en stock`;
  const soldBit = stk !== null && sold > 0 ? `<span class="stock-sold">${sold} vendido${sold !== 1 ? 's' : ''}</span>` : '';
  const stockRow = stk !== null
    ? `<div class="stock-row"><span class="stock-pill ${spClass}">● ${spText}</span>${soldBit}</div>`
    : '';
  return `
  <div class="prod-card cat-${p.cat}" onclick="openModal('${p.code}')">
    <div class="prod-card-body">
      <div class="namePiumPium">${p.namePiumPium}</div>
      <div>
        <div class="instpireby-label">inspirado en</div>
        <div class="prod-name">${p.inspiredBy.name}</div>
        <div class="prod-house">${p.inspiredBy.house}</div>
      </div>
      <div class="prod-badges">
        <span class="badge ${catBadge}">${catLabel}</span>
        <span class="badge" style="background:${fm.bg};color:${fm.c};">${FAMILY_LABELS[p.family]||p.family}</span>
      </div>
      <div class="cnotes">${notes}</div>
      ${stockRow}
    </div>
  </div>`;
}

function getFiltered() {
  const filtered = FRAGRANCE_DB.filter(p => {
    if (activeCat !== 'all' && p.cat !== activeCat) return false;
    if (activeFam !== 'all' && p.family !== activeFam) return false;
    if (searchQ) {
      const q = searchQ.toLowerCase();
      const hay = `${p.namePiumPium} ${p.inspiredBy.name} ${p.inspiredBy.house} ${p.code} ${(p.notes||[]).join(' ')}`.toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });
  // Sort by stock descending: items with stock first, then low stock, then zero, then no data
  return filtered.sort((a, b) => {
    const sa = _stockOf(a.code);
    const sb = _stockOf(b.code);
    const va = sa === null ? -1 : sa;
    const vb = sb === null ? -1 : sb;
    return vb - va;
  });
}

async function render() {
  await _loadInventory();
  const items = getFiltered();
  const grid = document.getElementById('catalog-grid');
  document.getElementById('count-badge').textContent = `${items.length} fragancia${items.length !== 1 ? 's' : ''}`;
  if (!items.length) {
    grid.innerHTML = `<div class="empty-state"><span>🌸</span>No encontramos fragancias con ese filtro.</div>`;
    return;
  }
  grid.innerHTML = items.map(renderCard).join('');
}

document.getElementById('filters-family').addEventListener('click', e => {
  const btn = e.target.closest('.fpill');

    b.className = 'fpill';
    if (b.dataset.fam === activeFam) b.classList.add(`active-${activeFam}`);
  });
  render();
});

let searchTimer;
document.getElementById('search-input').addEventListener('input', e => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => { searchQ = e.target.value.trim(); render(); }, 180);
});

// ── MODAL ──
async function openModal(code) {
  const p = FRAGRANCE_DB.find(x => x.code === code);
  if (!p) return;
  await _loadInventory();
  const fm = FAMILY_COLORS[p.family] || {bg:'#eee',c:'#333'};
  const strip = CAT_STRIP[p.cat] || '#C4732A';
  const catLabel = p.cat === 'dama' ? 'Dama ♀' : p.cat === 'cab' ? 'Caballero ♂' : 'Unisex ⚬';
  const catBadge = `badge-${p.cat}`;

  document.getElementById('modal-accent').style.background =
    `linear-gradient(90deg, ${strip}, ${fm.bg})`;

  const allNotes = (p.notes || []).map(n =>
    `<span class="modal-ntag ntag ${NOTE_CLASSES[n.toLowerCase()]||'ntag-musk'}">${n}</span>`
  ).join('');

  const similarHtml = p.similar && p.similar.length
    ? `<div class="modal-section">
        <div class="modal-section-title">también te puede gustar</div>
        <div class="similar-list">
          ${p.similar.map(s => `
            <div class="similar-row">
              <div class="similar-dot"></div>
              <div class="similar-name">${s.name}</div>
              <div class="similar-house">${s.house}</div>
            </div>`).join('')}
        </div>
       </div>` : '';

  const mStk  = _stockOf(p.code);
  const mSold = _soldOf(p.code);
  const mSpClass = mStk === null ? '' : mStk === 0 ? 'sp-zero' : mStk <= 5 ? 'sp-low' : 'sp-ok';
  const mNumClass = mStk === null ? '' : mStk === 0 ? 'sp-zero' : mStk <= 5 ? 'sp-low' : 'sp-ok';
  const stockSection = mStk !== null ? `
    <div class="modal-section">
      <div class="modal-section-title">disponibilidad</div>
      <div class="modal-stock-row ${mSpClass}">
        <div class="msr-num ${mNumClass}">${mStk}</div>
        <div class="msr-labels">
          <span class="msr-label">${mStk === 0 ? 'Sin stock' : mStk <= 5 ? 'Stock bajo' : 'En stock'}</span>
          <span class="msr-sold">${mSold} vendido${mSold !== 1 ? 's' : ''}</span>
        </div>
      </div>
    </div>` : '';

  document.getElementById('modal-content').innerHTML = `
    <div class="modal-header">
      <div class="modal-code">${p.namePiumPium}</div>
      <div class="modal-inspired-label">inspirado en</div>
      <div class="modal-perfume-name">${p.inspiredBy.name}</div>
      <div class="modal-house">${p.inspiredBy.house}</div>
      <div class="modal-badges">
        <span class="modal-badge ${catBadge}">${catLabel}</span>
        <span class="modal-badge" style="background:${fm.bg};color:${fm.c};">${FAMILY_LABELS[p.family]||p.family}</span>
        <span class="modal-badge" style="background:var(--cream2);color:var(--ink3);font-size:10px;">${p.code}</span>
      </div>
    </div>
    ${stockSection}
    <div class="modal-section">
      <div class="modal-section-title">notas olfativas</div>
      <div class="modal-notes">${allNotes}</div>
    </div>
    ${similarHtml}
  `;

  document.getElementById('modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}



function closeModal() {
  document.getElementById('modal').classList.remove('open');
  document.body.style.overflow = '';
}

function idbClear(s){return new Promise((r,j)=>{const q=db.transaction(s,'readwrite').objectStore(s).clear();q.onsuccess=()=>r();q.onerror=()=>j(q.error);});}

const SEED = FRAGRANCE_DB; // loaded from fragrance_db.js
const FAMILIES={floral:{label:"Floral",bg:"#FBEAF0",color:"#72243E"},fresh:{label:"Fresh",bg:"#E1F5EE",color:"#085041"},woody:{label:"Woody",bg:"#FAEEDA",color:"#633806"},oriental:{label:"Oriental",bg:"#FAECE7",color:"#4A1B0C"},gourmand:{label:"Gourmand",bg:"#EEEDFE",color:"#26215C"},chypre:{label:"Chypre",bg:"#EAF3DE",color:"#173404"},aquatic:{label:"Aquatic",bg:"#E6F1FB",color:"#042C53"},fougere:{label:"Fougère",bg:"#F1EFE8",color:"#2C2C2A"}};
async function seedIfEmpty(){const e=await idbGetAll('products');if(e.length>0)return;for(const p of SEED){const flat={cat:p.cat,code:p.code,namePiumPium:p.namePiumPium,name:p.inspiredBy.name,house:p.inspiredBy.house,family:p.family,notes:p.notes};await idbPut('products',flat);await idbPut('inventory',{code:p.code,stock:0,sold:0});}}
async function dbGetInv(c){const r=await idbGet('inventory',c);return r||{code:c,stock:0,sold:0};}
async function dbGetAllInv(){return idbGetAll('inventory');}
async function dbAddStock(c,q){const inv=await dbGetInv(c);inv.stock=(inv.stock||0)+q;return idbPut('inventory',inv);}
async function dbSell(c,q){const inv=await dbGetInv(c);inv.stock=Math.max(0,(inv.stock||0)-q);inv.sold=(inv.sold||0)+q;return idbPut('inventory',inv);}
async function dbLog(type,code,name,qty,note){return idbAdd('history',{type,code,name,qty,note:note||'',ts:new Date().toISOString()});}
async function dbGetHistory(){const a=await idbGetAll('history');return a.sort((a,b)=>b.ts.localeCompare(a.ts)).slice(0,300);}
async function dbGetOrders(sf){const all=await idbGetAll('orders');const s=all.sort((a,b)=>b.createdAt.localeCompare(a.createdAt));if(!sf||sf==='all')return s;return s.filter(o=>o.status===sf);}
async function dbGetOrder(id){return idbGet('orders',id);}
async function dbSaveOrder(o){return idbPut('orders',o);}
let currentPage='dashboard',currentCode=null,currentOrderId=null,pendingItemCode=null;
function showPage(id,btn){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.querySelectorAll('.bnav-btn').forEach(b=>b.classList.remove('active'));document.getElementById('page-'+id).classList.add('active');if(btn)btn.classList.add('active');currentPage=id;document.getElementById('scroll-area').scrollTop=0;document.getElementById('fab').style.display=id==='inventory'?'flex':'none';if(id==='dashboard')renderDashboard();if(id==='inventory')renderInventory();if(id==='orders'){showOrdersList();renderOrdersList();}if(id==='history')renderHistory();}
async function renderDashboard(){const[products,allInv,orders]=await Promise.all([idbGetAll('products'),dbGetAllInv(),idbGetAll('orders')]);const totalStock=allInv.reduce((s,i)=>s+(i.stock||0),0);const totalSold=allInv.reduce((s,i)=>s+(i.sold||0),0);const outOfStock=allInv.filter(i=>(i.stock||0)===0).length;const openOrders=orders.filter(o=>o.status==='open').length;const alerts=[...allInv.filter(i=>(i.stock||0)===0).slice(0,3).map(i=>{const p=products.find(x=>x.code===i.code);if(!p)return'';return`<div class="alert danger"><div class="alert-dot red"></div><span><strong>${p.name}</strong> — out of stock</span></div>`;}), ...allInv.filter(i=>(i.stock||0)>0&&(i.stock||0)<=5).slice(0,3).map(i=>{const p=products.find(x=>x.code===i.code);if(!p)return'';return`<div class="alert"><div class="alert-dot"></div><span><strong>${p.name}</strong> — ${i.stock} left</span></div>`;})].filter(Boolean);const topSold=[...allInv].sort((a,b)=>(b.sold||0)-(a.sold||0)).filter(i=>(i.sold||0)>0).slice(0,5);const openOrdersList=orders.filter(o=>o.status==='open').slice(0,4);document.getElementById('dash-content').innerHTML=`<div class="stats-grid"><div class="stat-card"><div class="stat-label">Fragrances</div><div class="stat-val">${products.length}</div></div><div class="stat-card"><div class="stat-label">Total stock</div><div class="stat-val gold">${totalStock}</div></div><div class="stat-card"><div class="stat-label">Total sold</div><div class="stat-val green">${totalSold}</div></div><div class="stat-card"><div class="stat-label">Open orders</div><div class="stat-val purple">${openOrders}</div></div></div>${alerts.length?`<div style="margin-bottom:10px;">${alerts.join('')}</div>`:'<div class="alert" style="margin-bottom:10px;"><div class="alert-dot"></div>All stock levels OK</div>'}${openOrdersList.length?`<div class="panel"><div class="panel-title">Open orders</div>${openOrdersList.map(o=>`<div class="rank-row"><span class="rank-num" style="color:var(--purple);font-size:16px;">●</span><span class="rank-name">${o.client}</span><span class="rank-val" style="color:var(--purple);">${o.items.length} item${o.items.length!==1?'s':''}</span></div>`).join('')}</div>`:''}<div class="panel"><div class="panel-title">Top sold</div>${topSold.length?topSold.map((i,idx)=>{const p=products.find(x=>x.code===i.code);return p?`<div class="rank-row"><span class="rank-num">${idx+1}</span><span class="rank-name">${p.name}</span><span class="rank-val sold">${i.sold}</span></div>`:''}).join(''):'<p class="empty-state" style="padding:1rem 0;">No sales yet.</p>'}</div><div style="height:16px;"></div>`;}
async function renderInventory(){const q=(document.getElementById('inv-q').value||'').toLowerCase();const cat=document.getElementById('inv-cat').value;const stockF=document.getElementById('inv-stock').value;const sortBy=document.getElementById('inv-sort').value;const[products,allInv]=await Promise.all([idbGetAll('products'),dbGetAllInv()]);const invMap=Object.fromEntries(allInv.map(i=>[i.code,i]));let items=products.filter(p=>{const inv=invMap[p.code]||{stock:0,sold:0};if(cat&&p.cat!==cat)return false;if(q&&!p.name.toLowerCase().includes(q)&&!p.house.toLowerCase().includes(q)&&!p.code.toLowerCase().includes(q))return false;if(stockF==='zero'&&(inv.stock||0)!==0)return false;if(stockF==='low'&&((inv.stock||0)===0||(inv.stock||0)>5))return false;if(stockF==='ok'&&(inv.stock||0)<=5)return false;return true;});items.sort((a,b)=>{const ia=invMap[a.code]||{stock:0,sold:0},ib=invMap[b.code]||{stock:0,sold:0};if(sortBy==='stock-asc')return(ia.stock||0)-(ib.stock||0);if(sortBy==='stock-desc')return(ib.stock||0)-(ia.stock||0);if(sortBy==='sold')return(ib.sold||0)-(ia.sold||0);return a.name.localeCompare(b.name);});document.getElementById('inv-count').textContent=`${items.length} fragrance${items.length!==1?'s':''}`;if(!items.length){document.getElementById('inv-list').innerHTML='<p class="empty-state">No fragrances match your filters.</p>';return;}document.getElementById('inv-list').innerHTML=items.map(p=>{const inv=invMap[p.code]||{stock:0,sold:0};const sc=(inv.stock||0)===0?'stock-zero':(inv.stock||0)<=5?'stock-low':'stock-ok';const gc=p.cat==='dama'?'badge-dama':p.cat==='cab'?'badge-cab':'badge-unisex';const gl=p.cat==='dama'?'Women':p.cat==='cab'?'Men':'Unisex';const fm=FAMILIES[p.family]||{label:p.family,bg:'#eee',color:'#333'};return`<div class="prod-card"><div class="prod-card-top"><div class="prod-card-info"><div class="namePiumPium">${p.namePiumPium||p.code}</div><div class="instpireby"><h3>inspired by:</h3><div class="prod-name">${p.name}</div><div class="prod-house">${p.house}</div></div><div class="prod-badges" style="margin-top:5px;"><span class="badge ${gc}">${gl}</span><span class="badge" style="background:${fm.bg};color:${fm.color};">${fm.label}</span></div><div class="prod-code" style="margin-top:4px;">${p.code}</div></div><div class="prod-stock-block"><div class="stock-big ${sc}">${inv.stock||0}</div><div class="stock-lbl">stock</div><div class="sold-lbl" style="margin-top:4px;">${inv.sold||0} sold</div></div></div><div class="prod-actions"><button class="btn btn-sm btn-green" onclick="openAddStock('${p.code}')">+ Stock</button><button class="btn btn-sm btn-red" onclick="openSell('${p.code}')">Sell</button><button class="btn btn-sm btn-outline" onclick="openEdit('${p.code}')">Edit</button></div></div>`;}).join('');}
function showOrdersList(){document.getElementById('orders-list-view').style.display='block';document.getElementById('order-detail-view').style.display='none';currentOrderId=null;}
function fmtDate(iso){const d=new Date(iso);return`${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;}
async function renderOrdersList(){const filter=document.getElementById('order-filter').value;const orders=await dbGetOrders(filter);if(!orders.length){document.getElementById('orders-list').innerHTML='<p class="empty-state">No orders yet. Tap <strong>+ Order</strong> to create one.</p>';return;}document.getElementById('orders-list').innerHTML=orders.map(o=>`<div class="order-card${o.status==='closed'?' closed':''}" onclick="openOrderDetail(${o.id})"><div class="order-header"><div><div class="order-id">#${String(o.id).padStart(4,'0')}</div><div class="order-client">${o.client}</div>${o.note?`<div class="order-date">${o.note}</div>`:''}</div><span class="order-status ${o.status==='open'?'os-open':'os-closed'}">${o.status==='open'?'Open':'Closed'}</span></div><div class="order-meta"><span class="order-items-count"><i class="ti ti-bottle" style="font-size:13px;vertical-align:-2px;"></i> ${o.items.reduce((s,i)=>s+i.qty,0)} unit${o.items.reduce((s,i)=>s+i.qty,0)!==1?'s':''} · ${o.items.length} fragrance${o.items.length!==1?'s':''}</span><span class="order-date" style="margin-left:auto;">${fmtDate(o.createdAt)}</span></div>${o.status==='closed'&&o.closedAt?`<div class="order-date" style="margin-top:4px;color:var(--green);">Closed ${fmtDate(o.closedAt)}</div>`:''}</div>`).join('');}
async function openOrderDetail(id){currentOrderId=id;document.getElementById('orders-list-view').style.display='none';document.getElementById('order-detail-view').style.display='block';await renderOrderDetail();}
async function renderOrderDetail(){const order=await dbGetOrder(currentOrderId);if(!order)return;const allInv=await dbGetAllInv();const invMap=Object.fromEntries(allInv.map(i=>[i.code,i]));const isClosed=order.status==='closed';const totalUnits=order.items.reduce((s,i)=>s+i.qty,0);const itemsHtml=order.items.length?order.items.map((item,idx)=>{const inv=invMap[item.code]||{stock:0};const sc=(inv.stock||0)===0?'zero':(inv.stock||0)<=5?'low':'ok';return`<div class="order-item-row"><div class="oir-info"><div class="oir-name">${item.name}</div><div class="oir-house">${item.house}</div></div>${isClosed?`<div style="text-align:right;"><div class="oir-qty">${item.qty}</div><div class="oir-stock">sold</div></div>`:`<div style="text-align:right;"><div class="qty-ctrl"><button class="qty-btn" onclick="changeItemQty(${idx},-1)">−</button><div class="oir-qty">${item.qty}</div><button class="qty-btn" onclick="changeItemQty(${idx},1)">+</button></div><div class="oir-stock" style="margin-top:4px;">stock: <span class="sr-stock ${sc}">${inv.stock||0}</span></div></div><button class="oir-del" onclick="removeOrderItem(${idx})" title="Remove"><i class="ti ti-trash" style="font-size:16px;"></i></button>`}</div>`;}).join(''):'<p class="empty-state" style="padding:1.5rem 0;">No items yet. Add fragrances below.</p>';document.getElementById('order-detail-content').innerHTML=`<button class="back-btn" onclick="showOrdersList();renderOrdersList();"><i class="ti ti-arrow-left"></i> Orders</button><div class="order-detail-header"><div class="odh-top"><div><div class="odh-id">#${String(order.id).padStart(4,'0')} · ${fmtDate(order.createdAt)}</div><div class="odh-client">${order.client}</div>${order.note?`<div class="odh-note">${order.note}</div>`:''}</div><span class="order-status ${isClosed?'os-closed':'os-open'}">${isClosed?'Closed':'Open'}</span></div>${!isClosed?`<div class="odh-actions"><button class="btn btn-purple btn-sm" onclick="openSheet('sheet-add-item');renderAddItemSearch()"><i class="ti ti-plus"></i> Add fragrance</button>${order.items.length?`<button class="btn btn-green btn-sm" onclick="openCloseOrderSheet()"><i class="ti ti-check"></i> Close order</button>`:''}</div>`:`<div class="odh-note" style="color:var(--green);margin-top:6px;">Closed ${fmtDate(order.closedAt)} · ${totalUnits} unit${totalUnits!==1?'s':''} deducted from stock</div>`}</div><div class="panel"><div class="panel-title">Items (${order.items.length})</div>${itemsHtml}</div>`;}
async function changeItemQty(idx,delta){const order=await dbGetOrder(currentOrderId);if(!order||order.status==='closed')return;order.items[idx].qty=Math.max(1,(order.items[idx].qty||1)+delta);await dbSaveOrder(order);renderOrderDetail();}
async function removeOrderItem(idx){const order=await dbGetOrder(currentOrderId);if(!order||order.status==='closed')return;order.items.splice(idx,1);await dbSaveOrder(order);renderOrderDetail();}
async function renderAddItemSearch(){const q=(document.getElementById('ai-search').value||'').toLowerCase();const[products,allInv]=await Promise.all([idbGetAll('products'),dbGetAllInv()]);const invMap=Object.fromEntries(allInv.map(i=>[i.code,i]));let items=products.filter(p=>!q||p.name.toLowerCase().includes(q)||p.house.toLowerCase().includes(q)||p.code.toLowerCase().includes(q));items=items.slice(0,20);document.getElementById('ai-results').innerHTML=items.map(p=>{const inv=invMap[p.code]||{stock:0};const sc=(inv.stock||0)===0?'zero':(inv.stock||0)<=5?'low':'ok';return`<div class="sr-row" onclick="pickItemQty('${p.code}','${p.name.replace(/'/g,"\\'")}','${p.house.replace(/'/g,"\\'")}')"><div style="flex:1;min-width:0;"><div class="sr-name">${p.name}</div><div class="sr-house">${p.house}</div></div><span class="sr-stock ${sc}">${inv.stock||0}</span></div>`;}).join('')||'<p class="empty-state" style="padding:1rem;">No results.</p>';}
function pickItemQty(code,name,house){pendingItemCode={code,name,house};closeSheet('sheet-add-item');document.getElementById('iq-info').innerHTML=`<strong>${name}</strong><br>${house}`;document.getElementById('iq-qty').value=1;openSheet('sheet-item-qty');}
async function confirmAddItem(){const qty=parseInt(document.getElementById('iq-qty').value)||1;if(qty<1){alert('Quantity must be at least 1.');return;}const order=await dbGetOrder(currentOrderId);if(!order||order.status==='closed')return;const existing=order.items.find(i=>i.code===pendingItemCode.code);if(existing){existing.qty+=qty;}else{order.items.push({code:pendingItemCode.code,name:pendingItemCode.name,house:pendingItemCode.house,qty});}await dbSaveOrder(order);closeSheet('sheet-item-qty');pendingItemCode=null;renderOrderDetail();}
async function openCloseOrderSheet(){const order=await dbGetOrder(currentOrderId);if(!order)return;const allInv=await dbGetAllInv();const invMap=Object.fromEntries(allInv.map(i=>[i.code,i]));document.getElementById('co-info').innerHTML=`Order <strong>#${String(order.id).padStart(4,'0')}</strong> for <strong>${order.client}</strong><br>This will deduct stock and register sales for all items below.`;const warnings=order.items.filter(item=>{const inv=invMap[item.code]||{stock:0};return(inv.stock||0)<item.qty;});document.getElementById('co-items-preview').innerHTML=order.items.map(item=>{const inv=invMap[item.code]||{stock:0};const warn=(inv.stock||0)<item.qty;return`<div class="rank-row" style="${warn?'color:var(--red);':''}"><span class="rank-name">${item.name}</span><span style="font-family:'DM Mono',monospace;font-size:12px;">${warn?`⚠ only ${inv.stock||0} in stock`:''} ×${item.qty}</span></div>`;}).join('')+(warnings.length?`<p style="font-size:12px;color:var(--red);margin-top:8px;">⚠ Some items exceed available stock. They will be deducted up to 0.</p>`:'');openSheet('sheet-close-order');}
async function confirmCloseOrder(){const order=await dbGetOrder(currentOrderId);if(!order||order.status==='closed')return;for(const item of order.items){await dbSell(item.code,item.qty);await dbLog('sell',item.code,item.name,-item.qty,`Order #${String(order.id).padStart(4,'0')} – ${order.client}`);}order.status='closed';order.closedAt=new Date().toISOString();await dbSaveOrder(order);await dbLog('order',`order-${order.id}`,`Order #${String(order.id).padStart(4,'0')}`,null,`Closed for ${order.client} · ${order.items.reduce((s,i)=>s+i.qty,0)} units`);closeSheet('sheet-close-order');await renderOrderDetail();if(currentPage==='dashboard')renderDashboard();}
async function confirmNewOrder(){const client=document.getElementById('no-client').value.trim();const note=document.getElementById('no-note').value.trim();if(!client){alert('Client name is required.');return;}const id=await idbAdd('orders',{client,note,status:'open',items:[],createdAt:new Date().toISOString(),closedAt:null});await dbLog('order',`order-${id}`,`Order #${String(id).padStart(4,'0')}`,null,`Opened for ${client}`);document.getElementById('no-client').value='';document.getElementById('no-note').value='';closeSheet('sheet-new-order');await renderOrdersList();openOrderDetail(id);}
async function renderHistory(){const rows=await dbGetHistory();if(!rows.length){document.getElementById('hist-panel').innerHTML='<p class="empty-state">No activity yet.</p>';return;}document.getElementById('hist-panel').innerHTML=rows.map(h=>{const tl=h.type==='add'?'Stock':h.type==='sell'?'Sale':h.type==='new'?'New':h.type==='order'?'Order':'Edit';const tc=h.type==='add'?'ht-add':h.type==='sell'?'ht-sell':h.type==='new'?'ht-new':h.type==='order'?'ht-order':'ht-edit';const d=new Date(h.ts);const ds=`${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;return`<div class="hist-row"><span class="hist-type ${tc}">${tl}</span><div class="hist-body"><strong>${h.name}</strong>${h.qty?` · ${h.qty>0?'+':''}${h.qty}`:''} ${h.note?`<em style="color:var(--ink3)">(${h.note})</em>`:''}<div class="hist-meta">${h.code}</div></div><span class="hist-date">${ds}</span></div>`;}).join('');}
async function clearHistory(){if(!confirm('Clear all history?'))return;await idbClear('history');renderHistory();}
function openSheet(id){document.getElementById(id).classList.add('open');}
function closeSheet(id){document.getElementById(id).classList.remove('open');}
function sheetBg(e,id){if(e.target===document.getElementById(id))closeSheet(id);}
async function openAddStock(c){currentCode=c;const[p,inv]=await Promise.all([idbGet('products',c),dbGetInv(c)]);document.getElementById('ss-info').innerHTML=`<strong>${p.name}</strong><br>${p.house}<br>Current: <strong>${inv.stock||0}</strong>`;document.getElementById('ss-qty').value=1;document.getElementById('ss-note').value='';openSheet('sheet-stock');}
async function confirmAddStock(){const qty=parseInt(document.getElementById('ss-qty').value)||0;const note=document.getElementById('ss-note').value.trim();if(qty<=0){alert('Enter a valid quantity.');return;}const p=await idbGet('products',currentCode);await dbAddStock(currentCode,qty);await dbLog('add',currentCode,p.name,qty,note);closeSheet('sheet-stock');renderInventory();if(currentPage==='dashboard')renderDashboard();}
async function openSell(c){currentCode=c;const[p,inv]=await Promise.all([idbGet('products',c),dbGetInv(c)]);document.getElementById('sl-info').innerHTML=`<strong>${p.name}</strong><br>${p.house}<br>Available: <strong>${inv.stock||0}</strong>`;document.getElementById('sl-qty').value=1;document.getElementById('sl-note').value='';openSheet('sheet-sell');}
async function confirmSell(){const qty=parseInt(document.getElementById('sl-qty').value)||0;const note=document.getElementById('sl-note').value.trim();const inv=await dbGetInv(currentCode);if(qty<=0){alert('Enter a valid quantity.');return;}if(qty>(inv.stock||0)){alert(`Only ${inv.stock||0} unit(s) available.`);return;}const p=await idbGet('products',currentCode);await dbSell(currentCode,qty);await dbLog('sell',currentCode,p.name,-qty,note);closeSheet('sheet-sell');renderInventory();if(currentPage==='dashboard')renderDashboard();}
async function confirmAddProduct(){const code=document.getElementById('na-code').value.trim();const name=document.getElementById('na-name').value.trim();const house=document.getElementById('na-house').value.trim();const cat=document.getElementById('na-cat').value;const family=document.getElementById('na-family').value;const stock=parseInt(document.getElementById('na-stock').value)||0;const notes=document.getElementById('na-notes').value.split(',').map(n=>n.trim().toLowerCase()).filter(Boolean);if(!code||!name||!house){alert('Code, name and house are required.');return;}const existing=await idbGet('products',code);if(existing){alert('Code already exists.');return;}await idbPut('products',{cat,code,name,house,family,notes});await idbPut('inventory',{code,stock,sold:0});await dbLog('new',code,name,null,`Initial stock: ${stock}`);closeSheet('sheet-add');renderInventory();if(currentPage==='dashboard')renderDashboard();}
async function openEdit(c){currentCode=c;const[p,inv]=await Promise.all([idbGet('products',c),dbGetInv(c)]);document.getElementById('ed-orig').value=c;document.getElementById('ed-code').value=p.code;document.getElementById('ed-name').value=p.name;document.getElementById('ed-house').value=p.house;document.getElementById('ed-cat').value=p.cat;document.getElementById('ed-family').value=p.family;document.getElementById('ed-stock').value=inv.stock||0;document.getElementById('ed-notes').value=(p.notes||[]).join(', ');openSheet('sheet-edit');}
async function confirmEdit(){const origCode=document.getElementById('ed-orig').value;const p=await idbGet('products',origCode);if(!p)return;p.name=document.getElementById('ed-name').value.trim();p.house=document.getElementById('ed-house').value.trim();p.cat=document.getElementById('ed-cat').value;p.family=document.getElementById('ed-family').value;p.notes=document.getElementById('ed-notes').value.split(',').map(n=>n.trim().toLowerCase()).filter(Boolean);await idbPut('products',p);const ns=parseInt(document.getElementById('ed-stock').value)||0;const inv=await dbGetInv(origCode);inv.stock=ns;await idbPut('inventory',inv);await dbLog('edit',origCode,p.name,null,'Profile updated');closeSheet('sheet-edit');renderInventory();if(currentPage==='dashboard')renderDashboard();}
async function resetAllStock(){if(!confirm('Reset ALL stock to 0? Sold counts are kept. This cannot be undone.'))return;const all=await idbGetAll('inventory');for(const inv of all){inv.stock=0;await idbPut('inventory',inv);}await dbLog('edit','*ALL*','Stock reset',null,'All items reset to 0');renderInventory();if(currentPage==='dashboard')renderDashboard();alert(`Done — ${all.length} items reset to 0.`);}
async function _initManager(){try{await openDB();await seedIfEmpty();document.getElementById('db-badge').textContent='IndexedDB ✓';document.getElementById('fab').style.display='none';await renderDashboard();}catch(e){document.getElementById('db-badge').textContent='DB error';document.getElementById('db-badge').style.background='rgba(194,59,42,0.15)';document.getElementById('db-badge').style.color='var(--red)';console.error(e);}}
</script>

<!-- init dispatcher -->
<script>
if (__IS_ADMIN) {
  _initManager();
} else {
  // catalog init: reload inventory and render
  _loadInventory().then(() => render());
}
</script>
