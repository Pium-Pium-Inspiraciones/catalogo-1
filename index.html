<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Pium Pium · Inspiraciones</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --cream:   #F5F0E8;
  --cream2:  #EDE5D8;
  --cream3:  #E0D5C5;
  --brown:   #5C2E0E;
  --brown2:  #8B4513;
  --brown3:  #C4732A;
  --gold:    #C4A03A;
  --gold2:   #E8C96A;
  --blush:   #F2C4C4;
  --blush2:  #E8A0A0;
  --olive:   #8B8B3A;
  --olive2:  #C4C43A;
  --ink:     #2A1A08;
  --ink2:    #5C3D20;
  --ink3:    #9A7A5A;
  --white:   #FEFCF8;
  --r:       14px;
  --safe-b:  env(safe-area-inset-bottom, 0px);

  /* family pill colors */
  --floral-bg:#FBEAF0; --floral-c:#72243E;
  --fresh-bg: #E1F5EE; --fresh-c: #085041;
  --woody-bg: #FAEEDA; --woody-c: #633806;
  --oriental-bg:#FAECE7; --oriental-c:#4A1B0C;
  --gourmand-bg:#EEEDFE; --gourmand-c:#26215C;
  --chypre-bg: #EAF3DE; --chypre-c: #173404;
  --aquatic-bg:#E6F1FB; --aquatic-c: #042C53;
  --fougere-bg:#F1EFE8; --fougere-c: #2C2C2A;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
  height: 100%;
  font-family: 'DM Sans', sans-serif;
  background: var(--cream);
  color: var(--ink);
  overflow-x: hidden;
}

/* ── HEADER ── */
.header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--cream);
  border-bottom: 1.5px solid var(--cream3);
}

.header-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 16px 6px;
}

.brand {
  display: flex;
  align-items: center;
  gap: 8px;
}

.brand-logo {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  object-fit: cover;
  border: 2px solid var(--brown3);
}

.brand-text {
  display: flex;
  flex-direction: column;
  line-height: 1.1;
}

.brand-name {
  font-family: 'Playfair Display', serif;
  font-size: 20px;
  font-weight: 700;
  color: var(--brown);
  letter-spacing: -0.02em;
}

.brand-sub {
  font-size: 10px;
  font-weight: 300;
  color: var(--ink3);
  letter-spacing: 0.12em;
  text-transform: uppercase;
}

.header-count {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--ink3);
  background: var(--cream2);
  padding: 4px 10px;
  border-radius: 999px;
  border: 0.5px solid var(--cream3);
}

/* search bar */
.search-wrap {
  padding: 0 16px 8px;
  position: relative;
}

.search-icon {
  position: absolute;
  left: 28px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 15px;
  color: var(--ink3);
  pointer-events: none;
}

.search-input {
  width: 100%;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 400;
  color: var(--ink);
  background: var(--white);
  border: 1px solid var(--cream3);
  border-radius: 999px;
  padding: 9px 16px 9px 38px;
  outline: none;
  transition: border-color 0.2s;
}

.search-input:focus { border-color: var(--brown3); }
.search-input::placeholder { color: var(--ink3); }

/* filter pills */
.filters-scroll {
  display: flex;
  gap: 6px;
  padding: 0 16px 10px;
  overflow-x: auto;
  scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
}
.filters-scroll::-webkit-scrollbar { display: none; }

.fpill {
  flex-shrink: 0;
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  font-weight: 500;
  padding: 5px 13px;
  border-radius: 999px;
  border: 1px solid var(--cream3);
  background: var(--white);
  color: var(--ink2);
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}

.fpill:active { transform: scale(0.95); }

.fpill.active-dama  { background: #FBEAF0; border-color: #E8A0A0; color: #72243E; }
.fpill.active-cab   { background: #E6F1FB; border-color: #9AB8D4; color: #0C447C; }
.fpill.active-unisex{ background: #E1F5EE; border-color: #9ACFB8; color: #085041; }
.fpill.active-all   { background: var(--brown); border-color: var(--brown); color: var(--white); }

.fpill.active-floral   { background: var(--floral-bg);   border-color: var(--blush2); color: var(--floral-c); }
.fpill.active-fresh    { background: var(--fresh-bg);    border-color: #9ACFB8;      color: var(--fresh-c); }
.fpill.active-woody    { background: var(--woody-bg);    border-color: #D4A87A;      color: var(--woody-c); }
.fpill.active-oriental { background: var(--oriental-bg); border-color: #D49A7A;      color: var(--oriental-c); }
.fpill.active-gourmand { background: var(--gourmand-bg); border-color: #A89ACC;      color: var(--gourmand-c); }
.fpill.active-chypre   { background: var(--chypre-bg);   border-color: #98B878;      color: var(--chypre-c); }
.fpill.active-aquatic  { background: var(--aquatic-bg);  border-color: #7AACCC;      color: var(--aquatic-c); }
.fpill.active-fougere  { background: var(--fougere-bg);  border-color: #B8B0A8;      color: var(--fougere-c); }

/* ── GRID ── */
.catalog-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  padding: 12px 12px calc(24px + var(--safe-b));
}

@media (max-width: 360px) {
  .catalog-grid { grid-template-columns: 1fr; }
}
@media (min-width: 600px) {
  .catalog-grid { grid-template-columns: repeat(3, 1fr); }
}

/* ── CARD ── */
.prod-card {
  background: var(--white);
  border: 1px solid var(--cream3);
  border-radius: var(--r);
  overflow: hidden;
  display: flex;
  flex-direction: column;
  animation: fadeUp 0.3s ease both;
  transition: transform 0.18s, box-shadow 0.18s;
  cursor: pointer;
}

.prod-card:active { transform: scale(0.97); }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* stagger */
.prod-card:nth-child(1) { animation-delay: 0.02s; }
.prod-card:nth-child(2) { animation-delay: 0.04s; }
.prod-card:nth-child(3) { animation-delay: 0.06s; }
.prod-card:nth-child(4) { animation-delay: 0.08s; }
.prod-card:nth-child(5) { animation-delay: 0.10s; }
.prod-card:nth-child(6) { animation-delay: 0.12s; }

/* card accent strip by cat */
.prod-card::before {
  content: '';
  display: block;
  height: 3px;
  background: var(--strip-color, var(--brown3));
}
.prod-card.cat-dama::before   { --strip-color: var(--blush2); }
.prod-card.cat-cab::before    { --strip-color: #7AACCC; }
.prod-card.cat-unisex::before { --strip-color: #9ACFB8; }

.prod-card-body {
  padding: 10px 11px 11px;
  display: flex;
  flex-direction: column;
  gap: 7px;
  flex: 1;
}

/* name */
.namePiumPium {
  font-family: 'DM Mono', monospace;
  font-size: 17px;
  font-weight: 500;
  color: var(--brown3);
  letter-spacing: 0.02em;
  line-height: 1;
}

/* inspired by */
.instpireby-label {
  font-size: 9px;
  font-weight: 500;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ink3);
  margin-bottom: 1px;
}

.prod-name {
  font-family: 'Playfair Display', serif;
  font-size: 12px;
  font-weight: 700;
  color: var(--ink);
  line-height: 1.25;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.prod-house {
  font-size: 10px;
  color: var(--ink3);
  font-weight: 300;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* badges row */
.prod-badges {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
}

.badge {
  display: inline-block;
  font-size: 9px;
  font-weight: 500;
  padding: 2px 7px;
  border-radius: 999px;
  letter-spacing: 0.03em;
}

.badge-dama   { background: #FBEAF0; color: #72243E; }
.badge-cab    { background: #E6F1FB; color: #0C447C; }
.badge-unisex { background: #E1F5EE; color: #085041; }

/* notes */
.cnotes {
  display: flex;
  flex-wrap: wrap;
  gap: 3px;
}

.ntag {
  font-size: 9px;
  font-weight: 400;
  padding: 2px 6px;
  border-radius: 999px;
}

/* note color map */
.ntag-rose, .ntag-jasmine, .ntag-peony, .ntag-floral, .ntag-lily, .ntag-freesia, .ntag-orchid, .ntag-tuberose {
  background: #FBEAF0; color: #72243E;
}
.ntag-bergamot, .ntag-lemon, .ntag-grapefruit, .ntag-citrus, .ntag-mandarin, .ntag-orange {
  background: #FFF8E1; color: #7A5700;
}
.ntag-musk, .ntag-sandalwood, .ntag-cedarwood, .ntag-cedar, .ntag-vetiver, .ntag-patchouli, .ntag-woody, .ntag-leather, .ntag-oud {
  background: #FAEEDA; color: #633806;
}
.ntag-vanilla, .ntag-tonka, .ntag-praline, .ntag-cocoa, .ntag-amber, .ntag-tonka\ bean, .ntag-gourmand {
  background: #FAC775; color: #412402;
}
.ntag-lavender, .ntag-iris, .ntag-violet, .ntag-heliotrope {
  background: #EEEDFE; color: #3C3489;
}
.ntag-aquatic, .ntag-sea\ notes, .ntag-mint, .ntag-fresh, .ntag-green\ notes {
  background: #E6F1FB; color: #042C53;
}
.ntag-raspberry, .ntag-cherry, .ntag-blackcurrant, .ntag-plum, .ntag-peach, .ntag-kiwi, .ntag-lychee, .ntag-pear, .ntag-apple, .ntag-mango, .ntag-coconut {
  background: #F0EAF8; color: #4A2870;
}
.ntag-incense, .ntag-resin, .ntag-saffron, .ntag-cardamom, .ntag-pepper, .ntag-spice, .ntag-cinnamon, .ntag-ginger, .ntag-pink\ pepper, .ntag-black\ pepper {
  background: #FAECE7; color: #4A1B0C;
}
.ntag-oakmoss, .ntag-geranium, .ntag-ylang\ ylang, .ntag-orange\ blossom, .ntag-camellia, .ntag-magnolia, .ntag-dragon\ fruit, .ntag-ambroxan, .ntag-guaiac\ wood, .ntag-cashmere, .ntag-white\ musk, .ntag-lotus {
  background: #EAF3DE; color: #173404;
}

/* ── EMPTY STATE ── */
.empty-state {
  grid-column: 1/-1;
  text-align: center;
  padding: 4rem 1rem;
  color: var(--ink3);
  font-size: 14px;
}

.empty-state span {
  display: block;
  font-size: 40px;
  margin-bottom: 12px;
}

/* ── MODAL ── */
.modal-overlay {
  position: fixed;
  inset: 0;
  z-index: 200;
  background: rgba(42, 26, 8, 0.55);
  backdrop-filter: blur(3px);
  -webkit-backdrop-filter: blur(3px);
  display: flex;
  align-items: flex-end;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s;
}

.modal-overlay.open {
  opacity: 1;
  pointer-events: all;
}

.modal-sheet {
  width: 100%;
  background: var(--white);
  border-radius: 22px 22px 0 0;
  padding: 0 0 calc(20px + var(--safe-b));
  max-height: 88vh;
  overflow-y: auto;
  transform: translateY(100%);
  transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
}

.modal-overlay.open .modal-sheet {
  transform: translateY(0);
}

.modal-handle {
  width: 40px;
  height: 4px;
  background: var(--cream3);
  border-radius: 2px;
  margin: 14px auto 0;
}

.modal-accent {
  height: 4px;
  margin-top: 12px;
}

.modal-header {
  padding: 16px 20px 0;
}

.modal-code {
  font-family: 'DM Mono', monospace;
  font-size: 22px;
  font-weight: 500;
  color: var(--brown3);
}

.modal-inspired-label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--ink3);
  margin-top: 10px;
}

.modal-perfume-name {
  font-family: 'Playfair Display', serif;
  font-size: 22px;
  font-weight: 700;
  color: var(--ink);
  line-height: 1.2;
  margin-top: 2px;
}

.modal-house {
  font-size: 13px;
  color: var(--ink3);
  margin-top: 2px;
}

.modal-badges {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-top: 10px;
}

.modal-badge {
  font-size: 11px;
  font-weight: 500;
  padding: 4px 12px;
  border-radius: 999px;
}

.modal-section {
  padding: 14px 20px 0;
}

.modal-section-title {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--ink3);
  font-weight: 500;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.modal-section-title::after {
  content: '';
  flex: 1;
  height: 0.5px;
  background: var(--cream3);
}

.modal-notes {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
}

.modal-ntag {
  font-size: 12px;
  font-weight: 400;
  padding: 4px 10px;
  border-radius: 999px;
}

.similar-list {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.similar-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 12px;
  background: var(--cream);
  border-radius: 10px;
}

.similar-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--brown3);
  flex-shrink: 0;
}

.similar-name {
  font-size: 13px;
  font-weight: 500;
  color: var(--ink);
  flex: 1;
  min-width: 0;
}

.similar-house {
  font-size: 11px;
  color: var(--ink3);
}

.modal-close-btn {
  display: block;
  width: calc(100% - 40px);
  margin: 18px 20px 0;
  padding: 13px;
  background: var(--brown);
  color: var(--white);
  border: none;
  border-radius: 12px;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  letter-spacing: 0.04em;
  transition: background 0.15s;
}

.modal-close-btn:active { background: var(--brown2); }

/* ── DECORATIVE HEADER BLOBS ── */
.header-deco {
  position: absolute;
  inset: 0;
  overflow: hidden;
  pointer-events: none;
  z-index: 0;
}

.page-hero {
  position: relative;
  overflow: hidden;
  background: var(--cream);
  padding: 28px 20px 22px;
  text-align: center;
  border-bottom: 1.5px solid var(--cream3);
}

.hero-blob {
  position: absolute;
  border-radius: 50%;
  opacity: 0.55;
  filter: blur(28px);
}

.hero-blob-1 {
  width: 200px; height: 200px;
  background: var(--blush);
  top: -60px; right: -40px;
}

.hero-blob-2 {
  width: 160px; height: 160px;
  background: var(--gold2);
  opacity: 0.35;
  bottom: -50px; left: -30px;
}

.hero-blob-3 {
  width: 130px; height: 130px;
  background: #D4B896;
  top: 20px; left: 30px;
  opacity: 0.4;
}

.hero-hearts {
  display: flex;
  justify-content: center;
  gap: 60px;
  margin-bottom: 4px;
  position: relative;
  z-index: 1;
}

.hero-heart {
  color: var(--brown2);
  font-size: 16px;
  opacity: 0.7;
}

.hero-title {
  font-family: 'Playfair Display', serif;
  font-size: 42px;
  font-weight: 700;
  color: var(--brown);
  line-height: 1;
  letter-spacing: -0.02em;
  position: relative;
  z-index: 1;
}

.hero-sub {
  font-size: 13px;
  font-weight: 300;
  letter-spacing: 0.18em;
  text-transform: lowercase;
  color: var(--ink2);
  margin-top: 6px;
  position: relative;
  z-index: 1;
}


/* ── STOCK PILL (catalog) ── */
.stock-pill {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  font-weight: 500;
  padding: 2px 8px;
  border-radius: 999px;
  margin-top: 4px;
}
.stock-pill.sp-ok   { background: #E8F5EF; color: #2a7a4a; }
.stock-pill.sp-low  { background: #FAEEDA; color: #C4732A; }
.stock-pill.sp-zero { background: #FFF0EE; color: #c23b2a; }
.stock-pill.sp-none { display: none; }

.modal-stock-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  border-radius: 10px;
  margin-top: 2px;
}
.modal-stock-row.sp-ok   { background: #E8F5EF; }
.modal-stock-row.sp-low  { background: #FAEEDA; }
.modal-stock-row.sp-zero { background: #FFF0EE; }
.msr-num {
  font-family: 'DM Mono', monospace;
  font-size: 26px;
  font-weight: 500;
  line-height: 1;
}
.msr-num.sp-ok   { color: #2a7a4a; }
.msr-num.sp-low  { color: #C4732A; }
.msr-num.sp-zero { color: #c23b2a; }
.msr-labels { display: flex; flex-direction: column; gap: 1px; }
.msr-label  { font-size: 9px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--ink3); }
.msr-sold   { font-size: 11px; color: var(--ink3); }

/* scrollbar */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--cream3); border-radius: 2px; }
</style>
</head>
<body>

<!-- HERO HEADER -->
<header>
  <div class="page-hero">
    <div class="hero-blob hero-blob-1"></div>
    <div class="hero-blob hero-blob-2"></div>
    <div class="hero-blob hero-blob-3"></div>
    <div class="hero-hearts">
      <span class="hero-heart">♥</span>
      <span class="hero-heart">♥</span>
    </div>
    <div class="hero-title">Pium Pium</div>
    <div class="hero-sub">inspiraciones</div>
  </div>

  <!-- STICKY SEARCH + FILTERS -->
  <div class="header">
    <div class="header-top">
      <div class="brand">
        <div class="brand-text">
          <span class="brand-name">Catálogo</span>
          <span class="brand-sub">fragancias</span>
        </div>
      </div>
      <span class="header-count" id="count-badge">— fragancias</span>
    </div>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input class="search-input" type="search" id="search-input"
        placeholder="Buscar por nombre, casa, código…"
        autocomplete="off" autocorrect="off" spellcheck="false">
    </div>
    <div class="filters-scroll" id="filters-cat">
      <button class="fpill active-all" data-cat="all">Todos</button>
      <button class="fpill" data-cat="dama">Dama ♀</button>
      <button class="fpill" data-cat="cab">Caballero ♂</button>
      <button class="fpill" data-cat="unisex">Unisex ⚬</button>
    </div>
    <div class="filters-scroll" id="filters-family">
      <button class="fpill" data-fam="all">Todas</button>
      <button class="fpill" data-fam="floral">Floral</button>
      <button class="fpill" data-fam="fresh">Fresh</button>
      <button class="fpill" data-fam="woody">Woody</button>
      <button class="fpill" data-fam="oriental">Oriental</button>
      <button class="fpill" data-fam="gourmand">Gourmand</button>
      <button class="fpill" data-fam="aquatic">Aquatic</button>
      <button class="fpill" data-fam="chypre">Chypre</button>
      <button class="fpill" data-fam="fougere">Fougère</button>
    </div>
  </div>
</header>

<!-- CATALOG GRID -->
<main>
  <div class="catalog-grid" id="catalog-grid"></div>
</main>

<!-- DETAIL MODAL -->
<div class="modal-overlay" id="modal" onclick="handleModalBg(event)">
  <div class="modal-sheet" id="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-accent" id="modal-accent"></div>
    <div id="modal-content"></div>
    <button class="modal-close-btn" onclick="closeModal()">Cerrar</button>
  </div>
</div>

<script src="fragrance_db.js"></script>
<script>

// ── SHARED STOCK (IndexedDB — same DB as piumpiummanager) ──
const DB_NAME = 'ParfumsDB', DB_VER = 3;
let _db = null;

function _openDB() {
  if (_db) return Promise.resolve(_db);
  return new Promise((res, rej) => {
    const req = indexedDB.open(DB_NAME, DB_VER);
    req.onupgradeneeded = e => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains('products')) {
        const s = d.createObjectStore('products', {keyPath:'code'});
        s.createIndex('cat','cat',{unique:false});
        s.createIndex('family','family',{unique:false});
      }
      if (!d.objectStoreNames.contains('inventory')) {
        const s = d.createObjectStore('inventory', {keyPath:'code'});
        s.createIndex('stock','stock',{unique:false});
        s.createIndex('sold','sold',{unique:false});
      }
      if (!d.objectStoreNames.contains('history')) {
        const s = d.createObjectStore('history', {keyPath:'id',autoIncrement:true});
      }
      if (!d.objectStoreNames.contains('orders')) {
        const s = d.createObjectStore('orders', {keyPath:'id',autoIncrement:true});
        s.createIndex('status','status',{unique:false});
        s.createIndex('createdAt','createdAt',{unique:false});
      }
    };
    req.onsuccess = e => { _db = e.target.result; res(_db); };
    req.onerror  = () => rej(req.error);
  });
}

function _idbGet(store, key) {
  return _openDB().then(db => new Promise((r,j) => {
    const q = db.transaction(store).objectStore(store).get(key);
    q.onsuccess = () => r(q.result);
    q.onerror   = () => j(q.error);
  }));
}

function _idbGetAll(store) {
  return _openDB().then(db => new Promise((r,j) => {
    const q = db.transaction(store).objectStore(store).getAll();
    q.onsuccess = () => r(q.result);
    q.onerror   = () => j(q.error);
  }));
}

// invMap cache: code → {stock, sold}
let _invMap = {};

async function _loadInventory() {
  try {
    const rows = await _idbGetAll('inventory');
    _invMap = Object.fromEntries(rows.map(r => [r.code, r]));
  } catch(e) {
    _invMap = {};
  }
}

function _stockOf(code) {
  const r = _invMap[code];
  return r ? (r.stock || 0) : null;   // null = manager never opened (no data yet)
}

function _soldOf(code) {
  const r = _invMap[code];
  return r ? (r.sold || 0) : 0;
}

// Re-load and re-render when tab becomes visible again (manager may have run)
document.addEventListener('visibilitychange', async () => {
  if (document.visibilityState === 'visible') {
    await _loadInventory();
    render();
  }
});

const FAMILY_LABELS = {
  floral:'Floral', fresh:'Fresh', woody:'Woody', oriental:'Oriental',
  gourmand:'Gourmand', chypre:'Chypre', aquatic:'Aquatic', fougere:'Fougère'
};

const FAMILY_COLORS = {
  floral:   {bg:'#FBEAF0',c:'#72243E'},
  fresh:    {bg:'#E1F5EE',c:'#085041'},
  woody:    {bg:'#FAEEDA',c:'#633806'},
  oriental: {bg:'#FAECE7',c:'#4A1B0C'},
  gourmand: {bg:'#EEEDFE',c:'#26215C'},
  chypre:   {bg:'#EAF3DE',c:'#173404'},
  aquatic:  {bg:'#E6F1FB',c:'#042C53'},
  fougere:  {bg:'#F1EFE8',c:'#2C2C2A'},
};

const CAT_STRIP = {
  dama:'#E8A0A0', cab:'#7AACCC', unisex:'#9ACFB8'
};

let activeCat = 'all', activeFam = 'all', searchQ = '';

function noteTag(note, big = false) {
  const cls = NOTE_CLASSES[note.toLowerCase()] || 'ntag-musk';
  const sz = big ? 'font-size:12px;padding:4px 10px;' : '';
  return `<span class="ntag ${cls}" style="${sz}">${note}</span>`;
}

function renderCard(p) {
  const fm = FAMILY_COLORS[p.family] || {bg:'#eee',c:'#333'};
  const catLabel = p.cat === 'dama' ? 'Dama' : p.cat === 'cab' ? 'Caballero' : 'Unisex';
  const catBadge = `badge-${p.cat}`;
  const notes = (p.notes || []).slice(0, 5).map(n => noteTag(n)).join('');
  const stk = _stockOf(p.code);
  const spClass = stk === null ? 'sp-none' : stk === 0 ? 'sp-zero' : stk <= 5 ? 'sp-low' : 'sp-ok';
  const spDot   = stk === null ? '' : stk === 0 ? '● Sin stock' : stk <= 5 ? `● ${stk} disponibles` : `● ${stk} en stock`;
  return `
  <div class="prod-card cat-${p.cat}" onclick="openModal('${p.code}')">
    <div class="prod-card-body">
      <div class="namePiumPium">${p.namePiumPium}</div>
      <div>
        <div class="instpireby-label">inspirado en</div>
        <div class="prod-name">${p.inspiredBy.name}</div>
        <div class="prod-house">${p.inspiredBy.house}</div>
      </div>
      <div class="prod-badges">
        <span class="badge ${catBadge}">${catLabel}</span>
        <span class="badge" style="background:${fm.bg};color:${fm.c};">${FAMILY_LABELS[p.family]||p.family}</span>
      </div>
      <div class="cnotes">${notes}</div>
      <span class="stock-pill ${spClass}">${spDot}</span>
    </div>
  </div>`;
}

function getFiltered() {
  return FRAGRANCE_DB.filter(p => {
    if (activeCat !== 'all' && p.cat !== activeCat) return false;
    if (activeFam !== 'all' && p.family !== activeFam) return false;
    if (searchQ) {
      const q = searchQ.toLowerCase();
      const hay = `${p.namePiumPium} ${p.inspiredBy.name} ${p.inspiredBy.house} ${p.code} ${(p.notes||[]).join(' ')}`.toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });
}

async function render() {
  await _loadInventory();
  const items = getFiltered();
  const grid = document.getElementById('catalog-grid');
  document.getElementById('count-badge').textContent = `${items.length} fragancia${items.length !== 1 ? 's' : ''}`;
  if (!items.length) {
    grid.innerHTML = `<div class="empty-state"><span>🌸</span>No encontramos fragancias con ese filtro.</div>`;
    return;
  }
  grid.innerHTML = items.map(renderCard).join('');
}

// ── FILTERS ──
document.getElementById('filters-cat').addEventListener('click', e => {
  const btn = e.target.closest('.fpill');
  if (!btn) return;
  activeCat = btn.dataset.cat;
  document.querySelectorAll('#filters-cat .fpill').forEach(b => {
    b.className = 'fpill';
    if (b.dataset.cat === activeCat) b.classList.add(`active-${activeCat}`);
  });
  render();
});

document.getElementById('filters-family').addEventListener('click', e => {
  const btn = e.target.closest('.fpill');
  if (!btn) return;
  activeFam = btn.dataset.fam;
  document.querySelectorAll('#filters-family .fpill').forEach(b => {
    b.className = 'fpill';
    if (b.dataset.fam === activeFam) b.classList.add(`active-${activeFam}`);
  });
  render();
});

let searchTimer;
document.getElementById('search-input').addEventListener('input', e => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => { searchQ = e.target.value.trim(); render(); }, 180);
});

// ── MODAL ──
async function openModal(code) {
  const p = FRAGRANCE_DB.find(x => x.code === code);
  if (!p) return;
  await _loadInventory();
  const fm = FAMILY_COLORS[p.family] || {bg:'#eee',c:'#333'};
  const strip = CAT_STRIP[p.cat] || '#C4732A';
  const catLabel = p.cat === 'dama' ? 'Dama ♀' : p.cat === 'cab' ? 'Caballero ♂' : 'Unisex ⚬';
  const catBadge = `badge-${p.cat}`;

  document.getElementById('modal-accent').style.background =
    `linear-gradient(90deg, ${strip}, ${fm.bg})`;

  const allNotes = (p.notes || []).map(n =>
    `<span class="modal-ntag ntag ${NOTE_CLASSES[n.toLowerCase()]||'ntag-musk'}">${n}</span>`
  ).join('');

  const similarHtml = p.similar && p.similar.length
    ? `<div class="modal-section">
        <div class="modal-section-title">también te puede gustar</div>
        <div class="similar-list">
          ${p.similar.map(s => `
            <div class="similar-row">
              <div class="similar-dot"></div>
              <div class="similar-name">${s.name}</div>
              <div class="similar-house">${s.house}</div>
            </div>`).join('')}
        </div>
       </div>` : '';

  const mStk  = _stockOf(p.code);
  const mSold = _soldOf(p.code);
  const mSpClass = mStk === null ? '' : mStk === 0 ? 'sp-zero' : mStk <= 5 ? 'sp-low' : 'sp-ok';
  const mNumClass = mStk === null ? '' : mStk === 0 ? 'sp-zero' : mStk <= 5 ? 'sp-low' : 'sp-ok';
  const stockSection = mStk !== null ? `
    <div class="modal-section">
      <div class="modal-section-title">disponibilidad</div>
      <div class="modal-stock-row ${mSpClass}">
        <div class="msr-num ${mNumClass}">${mStk}</div>
        <div class="msr-labels">
          <span class="msr-label">${mStk === 0 ? 'Sin stock' : mStk <= 5 ? 'Stock bajo' : 'En stock'}</span>
          <span class="msr-sold">${mSold} vendido${mSold !== 1 ? 's' : ''}</span>
        </div>
      </div>
    </div>` : '';

  document.getElementById('modal-content').innerHTML = `
    <div class="modal-header">
      <div class="modal-code">${p.namePiumPium}</div>
      <div class="modal-inspired-label">inspirado en</div>
      <div class="modal-perfume-name">${p.inspiredBy.name}</div>
      <div class="modal-house">${p.inspiredBy.house}</div>
      <div class="modal-badges">
        <span class="modal-badge ${catBadge}">${catLabel}</span>
        <span class="modal-badge" style="background:${fm.bg};color:${fm.c};">${FAMILY_LABELS[p.family]||p.family}</span>
        <span class="modal-badge" style="background:var(--cream2);color:var(--ink3);font-size:10px;">${p.code}</span>
      </div>
    </div>
    ${stockSection}
    <div class="modal-section">
      <div class="modal-section-title">notas olfativas</div>
      <div class="modal-notes">${allNotes}</div>
    </div>
    ${similarHtml}
  `;

  document.getElementById('modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}


async function resetAllStock(){
  if(!confirm('Reset ALL stock to 0? Sold counts are kept. This cannot be undone.'))return;
  await _openDB();
  const all = await _idbGetAll('inventory');
  const db  = await _openDB();
  await Promise.all(all.map(inv => new Promise((r,j)=>{
    inv.stock = 0;
    const q = db.transaction('inventory','readwrite').objectStore('inventory').put(inv);
    q.onsuccess=()=>r(); q.onerror=()=>j(q.error);
  })));
  await _loadInventory();
  render();
  alert(`Done — ${all.length} items reset to 0.`);
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  document.body.style.overflow = '';
}

function handleModalBg(e) {
  if (e.target === document.getElementById('modal')) closeModal();
}

// init cat filter active state
document.querySelector('#filters-cat .fpill[data-cat="all"]').classList.add('active-all');
document.querySelector('#filters-family .fpill[data-fam="all"]').classList.add('active-all');

_loadInventory().then(() => render());
